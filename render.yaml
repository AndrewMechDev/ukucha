services:
  - type: web
    name: ukucha-backend
    runtime: python
    buildCommand: pip install --no-deps -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: UKUCHA_USE_MOCK
        value: "1"
      - key: CORS_ORIGINS
        value: https://ukucha-frontend.onrender.com,http://localhost:5173

  - type: web
    name: ukucha-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://ukucha-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
