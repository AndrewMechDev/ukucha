services:
  - type: web
    name: ukucha-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: CORS_ORIGINS
        value: https://ukucha-frontend.onrender.com,http://localhost:5173
      - key: DEBUG
        value: "false"

  - type: web
    name: ukucha-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://ukucha-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
